version: '3.8'

# ---------------------------------------------------------------------------
# KYC Agent — Docker Compose Stack
#
# Usage:
#   docker-compose up              Start all services (auto-merges override file if present)
#   docker-compose up --build      Rebuild images then start
#   docker-compose down -v         Stop and remove all containers and volumes
#
# Configuration:
#   Copy .env.example to .env and override any defaults.
#   All _HOST variables control the network interface binding for each port.
#   Default: 127.0.0.1 (localhost only). Set 0.0.0.0 for remote access.
#   ⚠  Never use default credentials with 0.0.0.0 binding.
#
# GPU support (Ollama):
#   Uncomment the deploy.resources block in the ollama service definition.
# ---------------------------------------------------------------------------

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────
  # These services use restart: unless-stopped so they are always available.

  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "${PG_HOST:-127.0.0.1}:${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-kyc}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-kyc}
      POSTGRES_DB: ${PG_DB:-kycagent}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-kyc} -d ${PG_DB:-kycagent}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "${MINIO_HOST:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_KMS_AUTO_ENCRYPTION: "on"
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollamadata:/root/.ollama
    # GPU support — uncomment for NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Application ────────────────────────────────────────────────────────────
  # These services use restart: on-failure so they restart on crashes only.
  # An intentional stop (exit 0) does not trigger a restart.

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "${API_HOST:-127.0.0.1}:${API_PORT:-4000}:4000"
    environment:
      DATABASE_URL: postgresql://${PG_USER:-kyc}:${PG_PASSWORD:-kyc}@postgres:5432/${PG_DB:-kycagent}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  agent-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "src/workers/agent-worker.js"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://${PG_USER:-kyc}:${PG_PASSWORD:-kyc}@postgres:5432/${PG_DB:-kycagent}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_CONFIG_PATH: /app/config/llm.yaml
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    deploy:
      replicas: ${AGENT_WORKER_REPLICAS:-2}

  screening-sync:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "src/workers/screening-sync.js"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://${PG_USER:-kyc}:${PG_PASSWORD:-kyc}@postgres:5432/${PG_DB:-kycagent}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "${FRONTEND_HOST:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-4000}
      VITE_WS_URL: ws://localhost:${API_PORT:-4000}
    depends_on:
      - api

# ---------------------------------------------------------------------------
# Volumes — named volumes survive container restarts.
# Use `docker-compose down -v` to remove volumes (destroys all data).
# ---------------------------------------------------------------------------
volumes:
  pgdata:
  redisdata:
  miniodata:
  ollamadata:
